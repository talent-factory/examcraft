# Render.com Blueprint für ExamCraft AI
# Automatisches Deployment aller Services

databases:
  # PostgreSQL Database - MUSS ZUERST DEFINIERT WERDEN
  - name: examcraft-postgres
    plan: free
    region: frankfurt
    databaseName: examcraft
    user: examcraft
    ipAllowList: []

services:
  # Backend API Service (FastAPI)
  - type: web
    name: examcraft-backend
    runtime: python
    plan: starter
    region: frankfurt
    branch: feature/tf-108-render-deployment
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: examcraft-postgres
          property: connectionString
      - key: REDIS_URL
        value: redis://red-placeholder:6379
      - key: QDRANT_URL
        sync: false
      - key: VECTOR_SERVICE_TYPE
        value: qdrant
      - key: CLAUDE_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-3-5-sonnet-20241022
      - key: CLAUDE_MAX_RPM
        value: "50"
      - key: CLAUDE_MAX_TOKENS
        value: "4000"
      - key: CLAUDE_MAX_RETRIES
        value: "3"
      - key: CLAUDE_RETRY_DELAY
        value: "1.0"
      - key: CLAUDE_DEMO_MODE
        value: "false"
      - key: CORS_ORIGINS
        value: "*"

  # Frontend Service (React Static Site)
  - type: static_site
    name: examcraft-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/build
    pullRequestPreviewsEnabled: false
    branch: feature/tf-108-render-deployment
    envVars:
      - key: NODE_VERSION
        value: 18.18.0
      - key: REACT_APP_API_URL
        value: https://examcraft-backend.onrender.com
      - key: REACT_APP_ENVIRONMENT
        value: production

