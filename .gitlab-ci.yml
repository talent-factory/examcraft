# GitLab CI/CD Pipeline für ExamCraft AI
# Automatische Tests und Validierung bei jedem Push

stages:
  - validate
  - test
  - build
  - deploy

variables:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

# Cache für schnellere Builds
cache:
  paths:
    - backend/.venv/
    - frontend/node_modules/

# ============================================
# VALIDATION STAGE
# ============================================

validate:imports:
  stage: validate
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - cd backend
    - pip install --quiet -r requirements.txt
  script:
    - cd ..
    - python scripts/check_imports.py
  only:
    changes:
      - backend/**/*.py
      - utils/**/*.py
  tags:
    - docker

validate:requirements:
  stage: validate
  image: python:${PYTHON_VERSION}-slim
  script:
    - python scripts/validate_requirements.py
  only:
    changes:
      - backend/requirements.txt
      - backend/**/*.py
  tags:
    - docker

validate:yaml:
  stage: validate
  image: python:${PYTHON_VERSION}-slim
  script:
    - pip install --quiet pyyaml
    - python -c "import yaml; yaml.safe_load(open('render.yaml'))"
    - python -c "import yaml; yaml.safe_load(open('.gitlab-ci.yml'))"
  only:
    changes:
      - "*.yaml"
      - "*.yml"
  tags:
    - docker

# ============================================
# TEST STAGE
# ============================================

test:backend:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  services:
    - postgres:16
    - redis:latest
  variables:
    POSTGRES_DB: examcraft_test
    POSTGRES_USER: examcraft
    POSTGRES_PASSWORD: test_password
    DATABASE_URL: postgresql://examcraft:test_password@postgres:5432/examcraft_test
    REDIS_URL: redis://redis:6379
    VECTOR_SERVICE_TYPE: mock
    CLAUDE_API_KEY: test_key
  before_script:
    - cd backend
    - pip install --quiet -r requirements.txt
    - pip install --quiet pytest pytest-asyncio pytest-cov
  script:
    - python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
  only:
    changes:
      - backend/**/*.py
      - backend/requirements.txt
  tags:
    - docker

test:frontend:
  stage: test
  image: node:${NODE_VERSION}
  before_script:
    - cd frontend
    - npm ci --quiet
  script:
    - npm run lint
    - npm run test -- --watchAll=false --coverage
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml
  only:
    changes:
      - frontend/**/*
  tags:
    - docker

# ============================================
# BUILD STAGE
# ============================================

build:backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f backend/Dockerfile.production -t $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA backend/
    - docker build -f backend/Dockerfile.production -t $CI_REGISTRY_IMAGE/backend:latest backend/
    - docker push $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/backend:latest
  only:
    - develop
    - main
  tags:
    - docker

build:frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f frontend/Dockerfile.production -t $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA frontend/
    - docker build -f frontend/Dockerfile.production -t $CI_REGISTRY_IMAGE/frontend:latest frontend/
    - docker push $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/frontend:latest
  only:
    - develop
    - main
  tags:
    - docker

# ============================================
# DEPLOY STAGE (Optional)
# ============================================

deploy:staging:
  stage: deploy
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install --quiet requests
  script:
    - echo "Deploying to Render.com staging..."
    - |
      curl -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
        -H "Authorization: Bearer ${RENDER_API_KEY}" \
        -H "Content-Type: application/json" \
        -d '{"clearCache": "do_not_clear"}'
  only:
    - develop
  when: manual
  environment:
    name: staging
    url: https://examcraft-backend-c0bm.onrender.com
  tags:
    - docker

deploy:production:
  stage: deploy
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install --quiet requests
  script:
    - echo "Deploying to Render.com production..."
    - |
      curl -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID_PROD}/deploys" \
        -H "Authorization: Bearer ${RENDER_API_KEY}" \
        -H "Content-Type: application/json" \
        -d '{"clearCache": "do_not_clear"}'
  only:
    - main
  when: manual
  environment:
    name: production
    url: https://examcraft-production.onrender.com
  tags:
    - docker

