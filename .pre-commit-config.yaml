# Pre-Commit Hooks für ExamCraft AI
# Automatische Code-Qualitätsprüfung vor jedem Commit
#
# Installation:
#   pip install pre-commit
#   pre-commit install
#
# Manuell ausführen:
#   pre-commit run --all-files

repos:
  # Python Code Formatting
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.11
        files: ^(backend|utils)/.*\.py$

  # Python Import Sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]
        files: ^(backend|utils)/.*\.py$

  # Python Linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(backend|utils)/.*\.py$

  # YAML Validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        args: ['--unsafe']  # Für render.yaml mit custom tags
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

  # Python Security Check
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
        files: ^backend/.*\.py$

  # TypeScript/JavaScript Linting
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        files: ^frontend/src/.*\.(ts|tsx|js|jsx)$
        types: [file]
        additional_dependencies:
          - eslint@8.56.0
          - "@typescript-eslint/parser@6.19.0"
          - "@typescript-eslint/eslint-plugin@6.19.0"

  # Custom Python Import Check
  - repo: local
    hooks:
      - id: check-python-imports
        name: Check Python Imports
        entry: python scripts/check_imports.py
        language: system
        files: ^(backend|utils)/.*\.py$
        pass_filenames: false

      - id: validate-requirements
        name: Validate Requirements
        entry: python scripts/validate_requirements.py
        language: system
        files: ^backend/requirements\.txt$
        pass_filenames: false

      - id: run-backend-tests
        name: Run Backend Tests
        entry: bash -c 'cd backend && python -m pytest tests/ -v --tb=short'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
        stages: [commit]

      - id: check-docker-build
        name: Check Docker Build (Backend)
        entry: bash -c 'docker build -f backend/Dockerfile.production -t examcraft-backend-test backend/ --quiet'
        language: system
        files: ^(backend/Dockerfile\.production|backend/requirements\.txt)$
        pass_filenames: false
        stages: [push]

