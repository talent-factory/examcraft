name: examcraft

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: examcraft_postgres
    environment:
      POSTGRES_DB: examcraft
      POSTGRES_USER: examcraft
      POSTGRES_PASSWORD: examcraft_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d
    networks:
      - examcraft_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: examcraft_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - examcraft_network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: examcraft_qdrant
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API (optional)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    networks:
      - examcraft_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-unknown}
    container_name: examcraft_backend
    environment:
      - DATABASE_URL=postgresql://examcraft:examcraft_dev@postgres:5432/examcraft
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - VECTOR_SERVICE_TYPE=qdrant
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=development
      - BUILD_TIMESTAMP=${BUILD_TIMESTAMP:-unknown}
      - DOCUMENT_PROCESSOR_TYPE=${DOCUMENT_PROCESSOR_TYPE:-legacy}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-sentence-transformers}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./pyproject.toml:/app/pyproject.toml:ro
      - /app/__pycache__
    depends_on:
      - postgres
      - redis
      - qdrant
    networks:
      - examcraft_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: examcraft_frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_ENVIRONMENT=development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - examcraft_network
    command: npm start

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  examcraft_network:
    driver: bridge
