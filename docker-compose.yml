name: examcraft-core

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: examcraft_postgres
    environment:
      POSTGRES_USER: examcraft
      POSTGRES_PASSWORD: examcraft_dev_password
      POSTGRES_DB: examcraft
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U examcraft"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - examcraft_network

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: examcraft_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - examcraft_network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: examcraft_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - examcraft_network

  # Core Backend (Open Source)
  backend:
    build:
      context: .
      dockerfile: ./packages/core/backend/Dockerfile
    container_name: examcraft_backend
    environment:
      # Database
      DATABASE_URL: postgresql://examcraft:examcraft_dev_password@postgres:5432/examcraft

      # Redis (internal port 6379, external port 6380)
      REDIS_URL: redis://redis:6379/0

      # Qdrant
      QDRANT_URL: http://qdrant:6333
      VECTOR_SERVICE_TYPE: qdrant

      # JWT
      JWT_SECRET_KEY: dev_secret_key_change_in_production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7

      # CORS
      CORS_ORIGINS: http://localhost:3000,http://localhost:8000

      # Feature Flags (Free Tier)
      DEFAULT_SUBSCRIPTION_TIER: free

      # Claude API (Optional for Core)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # Environment
      ENVIRONMENT: development
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./packages/core/backend:/app
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - examcraft_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Core Frontend (Open Source)
  frontend:
    build:
      context: .
      dockerfile: ./packages/core/frontend/Dockerfile
    container_name: examcraft_frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_ENVIRONMENT: development
      REACT_APP_ENABLE_PREMIUM_FEATURES: "false"
      REACT_APP_ENABLE_ENTERPRISE_FEATURES: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./packages/core/frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - examcraft_network
    command: npm start

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  backend_storage:
    driver: local

networks:
  examcraft_network:
    driver: bridge
