version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: examcraft_postgres
    environment:
      POSTGRES_DB: examcraft
      POSTGRES_USER: examcraft
      POSTGRES_PASSWORD: examcraft_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d
    networks:
      - examcraft_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: examcraft_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - examcraft_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: examcraft_backend
    environment:
      - DATABASE_URL=postgresql://examcraft:examcraft_dev@postgres:5432/examcraft
      - REDIS_URL=redis://redis:6379
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      - postgres
      - redis
    networks:
      - examcraft_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: examcraft_frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_ENVIRONMENT=development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - examcraft_network
    command: npm start

volumes:
  postgres_data:
  redis_data:

networks:
  examcraft_network:
    driver: bridge
