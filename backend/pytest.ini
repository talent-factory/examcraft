[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=services
    --cov=api
    --cov=models
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80
markers =
    unit: Unit tests
    integration: Integration tests requiring PostgreSQL
    slow: Slow running tests
    postgres: Tests requiring PostgreSQL database
asyncio_mode = auto

# Environment Variables für Tests
env =
    TEST_DATABASE_URL=postgresql://examcraft:examcraft_dev@localhost:5432/examcraft_test
