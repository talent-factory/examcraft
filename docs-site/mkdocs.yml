site_name: ExamCraft AI Dokumentation
site_url: https://docs.examcraft.ch
site_description: Benutzerhandbuch und Admin-Guide fuer ExamCraft AI
repo_url: https://github.com/talent-factory/examcraft
edit_uri: edit/main/docs-site/docs/

theme:
  name: material
  language: de
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Zum Dunkelmodus wechseln
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Zum Hellmodus wechseln
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.action.edit

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: de
          name: Deutsch
          default: true
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Start: Home
            Benutzerhandbuch: User Guide
            Admin-Guide: Admin Guide
            FAQ: FAQ
            Changelog: Changelog

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

nav:
  - Start:
      - index.md
      - getting-started/quickstart.md
      - getting-started/requirements.md
      - getting-started/registration.md
  - Benutzerhandbuch:
      - user-guide/documents.md
      - user-guide/exam-create.md
      - user-guide/rag-exam.md
      - user-guide/chatbot.md
      - user-guide/exam-export.md
      - user-guide/best-practices.md
  - Admin-Guide:
      - admin-guide/deployment.md
      - admin-guide/user-mgmt.md
      - admin-guide/institutions.md
      - admin-guide/prompts.md
      - admin-guide/subscription.md
      - admin-guide/monitoring.md
  - FAQ:
      - faq/general.md
      - faq/troubleshooting.md
  - Changelog: changelog.md
