# =============================================================================
# ExamCraft AI Backend - Fly.io Configuration
# =============================================================================

app = "examcraft-api"
primary_region = "fra"  # Frankfurt

[build]
  dockerfile = "packages/core/backend/Dockerfile.fly"

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"
  DEPLOYMENT_MODE = "full"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    port = 8000
    type = "http"
    interval = "15s"
    timeout = "5s"
    path = "/api/v1/health"
