# =============================================================================
# ExamCraft AI Flower - Fly.io Configuration
# Celery Monitoring Dashboard
# =============================================================================

app = "examcraft-flower"
primary_region = "fra"  # Frankfurt

[build]
  dockerfile = "packages/core/backend/Dockerfile.flower"

[env]
  PYTHONUNBUFFERED = "1"
  FLOWER_UNAUTHENTICATED_API = "false"
  # CELERY_BROKER_URL wird als Secret gesetzt
  # FLOWER_BASIC_AUTH wird als Secret gesetzt (user:password)

[processes]
  app = "sh -c 'celery -A celery_app flower --port=5555 --basic-auth=$FLOWER_BASIC_AUTH'"

[[services]]
  internal_port = 5555
  protocol = "tcp"
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 40

  [[services.tcp_checks]]
    interval = 30000
    timeout = 5000

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
